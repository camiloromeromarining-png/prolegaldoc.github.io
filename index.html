<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Legal - Solicitud de Documentos</title>
    <style>
        /* Estilos Básicos y Limpios */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        
        /* Banner / Hero */
        .banner {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        .banner h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }
        .banner p {
            margin: 0;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        /* Contenedor del Formulario */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container h2 {
            margin-top: 0;
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Elementos del Formulario */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 1rem; /* Tamaño de letra estándar y legible (16px) */
            font-family: inherit;
            color: #333;
        }
        textarea {
            resize: vertical;
        }
        
        /* Botón de Envío */
        .btn-submit {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- BANNER -->
    <header class="banner">
        <h1>Tu Soporte Legal Digital</h1>
        <p>Solicita la creación y estructuración de tus documentos legales y minutas.</p>
    </header>

    <!-- ESPACIO DE LA SOLICITUD -->
    <main class="container">
        <h2>Nueva Solicitud de Documento</h2>
        
        <form action="#" method="POST">
            
            <!-- Datos del Solicitante -->
            <div class="form-group">
                <label for="nombre">Nombre Completo *</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico *</label>
                <input type="email" id="correo" name="correo" required placeholder="correo@ejemplo.com">
            </div>

            <!-- Detalles del Requerimiento -->
            <div class="form-group">
                <label for="tipo">Tipo de Soporte Documental *</label>
                <select id="tipo" name="tipo" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="contrato">Estructuración / Redacción de Contrato</option>
                    <option value="minuta">Elaboración de Minutas y Poderes</option>
                    <option value="corporativo">Documentación Corporativa / Actas</option>
                    <option value="revision">Revisión y Auditoría de Documento</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha Límite Requerida *</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="asunto">Asunto o Título del Documento *</label>
                <input type="text" id="asunto" name="asunto" required placeholder="Ej. Contrato de Arrendamiento Comercial">
            </div>

            <div class="form-group">
                <label for="detalles">Instrucciones y Datos Clave *</label>
                <textarea id="detalles" name="detalles" rows="5" required placeholder="Describe las partes involucradas, condiciones especiales y el objetivo del documento..."></textarea>
            </div>

            <!-- Botón -->
            <button type="submit" class="btn-submit">Enviar Requerimiento</button>

        </form>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Tu Soporte Legal. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
